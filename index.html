<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .hero {
            text-align: center;
            padding: 4rem 2rem 2rem;
        }
        .hero h1 {
            font-size: 2.5rem;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            margin-top: 0.75rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .courses {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 2rem 4rem;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2rem;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #818cf8;
            box-shadow: 0 8px 24px rgba(129, 140, 248, 0.12);
        }
        .card h2 { font-size: 1.35rem; font-weight: 600; }
        .card-meta {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 1px solid #334155;
            font-size: 0.85rem;
            color: #64748b;
        }
        .badge {
            padding: 0.15em 0.6em;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(129, 140, 248, 0.15);
            color: #818cf8;
        }
        .empty {
            text-align: center;
            color: #64748b;
            padding: 4rem 2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #475569;
            font-size: 0.85rem;
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.8rem; }
            .courses { grid-template-columns: 1fr; padding: 0 1rem 3rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Learning Hub</h1>
        <p>系统化教程合集，双击即学</p>
    </div>
    <div class="courses" id="course-list"></div>
    <footer>Built with make-tutorial</footer>

    <script>
    fetch('courses.json')
        .then(r => r.json())
        .then(courses => {
            const el = document.getElementById('course-list');
            if (!courses.length) {
                el.innerHTML = '<div class="empty">暂无教程</div>';
                return;
            }
            el.innerHTML = courses.map(c => `
                <a class="card" href="${c.dir}/index.html">
                    <h2>${c.title}</h2>
                    <div class="card-meta">
                        ${c.chapters ? `<span>${c.chapters} 章</span>` : ''}
                        ${c.updated ? `<span>${c.updated}</span>` : ''}
                    </div>
                </a>
            `).join('');
        })
        .catch(() => {
            document.getElementById('course-list').innerHTML = '<div class="empty">加载失败，请运行 update.bat 生成 courses.json</div>';
        });
    </script>
</body>
</html>
